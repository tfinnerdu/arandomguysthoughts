<form action="https://formspree.io/f/mojyeojl" method="POST" 
      style="max-width: 600px; margin: 2rem 0;">
  <div style="margin-bottom: 1rem;">
    <label for="name" style="display: block; margin-bottom: 0.25rem; font-weight: bold;">Name</label>
    <input type="text" name="name" id="name" required
           style="width: 100%; padding: 0.5rem; border: 1px solid #444; border-radius: 4px; background: var(--color-neutral-800); color: var(--color-neutral-100);">
  </div>
  <div style="margin-bottom: 1rem;">
    <label for="email" style="display: block; margin-bottom: 0.25rem; font-weight: bold;">Email</label>
    <input type="email" name="email" id="email" required
           style="width: 100%; padding: 0.5rem; border: 1px solid #444; border-radius: 4px; background: var(--color-neutral-800); color: var(--color-neutral-100);">
  </div>
  <div style="margin-bottom: 1rem;">
    <label for="message" style="display: block; margin-bottom: 0.25rem; font-weight: bold;">Message</label>
    <textarea name="message" id="message" rows="6" required
              style="width: 100%; padding: 0.5rem; border: 1px solid #444; border-radius: 4px; background: var(--color-neutral-800); color: var(--color-neutral-100);"></textarea>
  </div>
<button type="submit"
        style="padding: 0.75rem 2rem; background: #3b82f6; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 1rem; font-weight: bold;">
    Send
</button>
</form>
